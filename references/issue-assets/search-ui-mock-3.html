<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Vector Search Demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #f6f7f9;
    --surface: #ffffff;
    --ink: #1a1d23;
    --muted: #6b7280;
    --line: #e6e8ec;
    --accent: #5b54e8;
    --accent-soft: #ecebfc;
    --passage-bg: #fff4d6;
    --passage-edge: #e0a200;
    --radius: 12px;
    --serif: "Fraunces", Georgia, serif;
    --sans: "Inter", system-ui, sans-serif;
    --mono: "IBM Plex Mono", ui-monospace, monospace;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: var(--sans);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 720px; margin: 0 auto; padding: 52px 24px 96px; }

  header { margin-bottom: 30px; }
  h1 {
    font-family: var(--serif);
    font-weight: 600;
    font-size: 30px;
    letter-spacing: -0.01em;
    margin: 0 0 4px;
  }
  header p { margin: 0; color: var(--muted); font-size: 15px; }

  .searchbar {
    display: flex;
    gap: 10px;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 8px 8px 8px 16px;
    box-shadow: 0 1px 2px rgba(26, 29, 35, 0.04);
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .searchbar:focus-within { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
  .searchbar input {
    flex: 1; border: 0; outline: 0; background: transparent;
    font-family: var(--sans); font-size: 16px; color: var(--ink);
  }
  .searchbar button {
    border: 0; background: var(--accent); color: #fff;
    font-family: var(--sans); font-weight: 500; font-size: 15px;
    padding: 0 22px; border-radius: 8px; cursor: pointer; transition: filter 0.15s;
  }
  .searchbar button:hover { filter: brightness(1.07); }
  .searchbar button:focus-visible { outline: 3px solid var(--accent-soft); outline-offset: 2px; }

  .meta {
    display: flex; align-items: center; gap: 14px;
    margin: 22px 2px 12px; font-size: 13px; color: var(--muted);
  }
  .legend { display: inline-flex; align-items: center; gap: 7px; font-family: var(--mono); font-size: 12px; }
  .legend .swatch {
    width: 22px; height: 12px; border-radius: 3px;
    background: var(--passage-bg); border-bottom: 2px solid var(--passage-edge);
  }
  .count { font-family: var(--mono); font-size: 12px; }

  .results { display: flex; flex-direction: column; gap: 14px; }

  .card {
    background: var(--surface); border: 1px solid var(--line);
    border-radius: var(--radius); padding: 20px 22px;
    animation: rise 0.3s ease both;
  }
  @keyframes rise { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

  .card-head { display: flex; justify-content: space-between; align-items: baseline; gap: 18px; margin-bottom: 12px; }
  .card-head h2 { font-family: var(--serif); font-weight: 600; font-size: 19px; margin: 0; letter-spacing: -0.01em; }

  .rel { text-align: right; flex-shrink: 0; min-width: 96px; }
  .rel .bar { height: 4px; width: 96px; background: var(--line); border-radius: 99px; overflow: hidden; margin-bottom: 5px; }
  .rel .bar > span { display: block; height: 100%; width: 0; background: var(--accent); border-radius: 99px; transition: width 0.55s ease; }
  .rel .label { font-family: var(--mono); font-size: 11px; color: var(--muted); }

  .doc-text { font-size: 14.5px; color: #353a44; margin: 0; }
  mark.passage {
    background: var(--passage-bg);
    color: var(--ink);
    padding: 1px 3px;
    border-radius: 3px;
    box-shadow: inset 0 -2px 0 var(--passage-edge);
  }

  .card-foot { display: flex; justify-content: space-between; align-items: center; margin-top: 16px; }
  .docid { font-family: var(--mono); font-size: 12px; color: var(--muted); }
  .download {
    font-family: var(--sans); font-weight: 500; font-size: 13px;
    color: var(--accent); text-decoration: none;
    border: 1px solid var(--line); padding: 7px 14px; border-radius: 8px;
    transition: background 0.15s, border-color 0.15s;
  }
  .download:hover { background: var(--accent-soft); border-color: var(--accent); }
  .download:focus-visible { outline: 3px solid var(--accent-soft); outline-offset: 2px; }

  .empty { text-align: center; color: var(--muted); padding: 44px 20px; border: 1px dashed var(--line); border-radius: var(--radius); font-size: 14px; }

  @media (prefers-reduced-motion: reduce) {
    .card { animation: none; }
    .rel .bar > span { transition: none; }
  }
  @media (max-width: 520px) {
    .card-head { flex-direction: column; }
    .rel { text-align: left; }
    h1 { font-size: 25px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Vector Search Demo</h1>
    <p>Semantic similarity search over a small document corpus.</p>
  </header>

  <div class="searchbar">
    <input id="q" type="text" placeholder="e.g. how does vector search work?" autocomplete="off" aria-label="Search query" />
    <button id="go">Search</button>
  </div>

  <div class="meta">
    <span class="legend"><span class="swatch" aria-hidden="true"></span>passage closest to your query</span>
    <span class="count" id="count"></span>
  </div>

  <div class="results" id="results"></div>
</div>

<script>
  // --- Hardcoded corpus (mock; replace with a real /search response later) ---
  const CORPUS = [
    { id: "doc-001", title: "Introduction to Vector Search",
      text: "Vector search finds similar items by comparing high-dimensional numerical vectors rather than matching exact keywords. Each document is converted into an embedding — a dense list of floating point numbers that captures its semantic meaning. Two documents about the same topic end up near each other even if they share no words. At query time the search compares the query's vector against the stored vectors and returns the closest matches." },
    { id: "doc-002", title: "Semantic Similarity and Embedding Models",
      text: "Embedding models transform text into dense vector representations that preserve semantic relationships between words and sentences. Two passages with similar meaning end up close together in the vector space even when they share no words. Cosine similarity measures how aligned two vectors are, and a higher score means the texts are more related. This is what lets search retrieve results by meaning instead of literal term overlap." },
    { id: "doc-003", title: "Approximate Nearest Neighbor Algorithms",
      text: "Approximate nearest neighbour algorithms such as HNSW and IVF-Flat enable fast lookups in high-dimensional vector spaces, trading a small amount of accuracy for very large speed gains. HNSW builds a layered proximity graph and greedily walks toward the closest neighbours of the query. IVF partitions vectors into clusters and searches only the most promising ones. These indexes make similarity search practical at the scale of millions or billions of vectors." },
    { id: "doc-004", title: "Milvus Vector Database Setup",
      text: "Milvus is an open-source vector database designed for high-performance similarity search. It supports multiple index types including HNSW and IVF, scales to billions of vectors, and exposes a gRPC API for creating collections, inserting embeddings, and running searches. A standalone deployment runs in Docker with etcd and object storage alongside the core engine. You define a collection schema, build an index on the vector field, and pick a metric such as cosine." },
    { id: "doc-005", title: "Transformer Sentence Embeddings with MiniLM",
      text: "Sentence-Transformers and the MiniLM model family produce compact, high-quality sentence embeddings at low computational cost. MiniLM-L6-v2 outputs a 384-dimensional vector and runs fast enough to embed documents locally on a laptop CPU, with no API key required. Normalizing the output vectors lets you use cosine similarity directly. It is a popular default for prototyping semantic search." },
  ];

  // Small related-term map: a stand-in for semantic similarity so non-exact
  // queries still highlight a sensible passage. The real app uses sentence
  // embeddings instead of this map.
  const RELATED = {
    vector: ["vectors", "embedding", "embeddings", "dense", "numerical", "dimensional", "space"],
    search: ["retrieve", "retrieves", "lookup", "lookups", "query", "find", "finds", "similarity"],
    similarity: ["similar", "cosine", "aligned", "related", "meaning", "semantic", "close"],
    embedding: ["embeddings", "vector", "vectors", "dense", "representation", "representations"],
    meaning: ["semantic", "similarity", "related", "represent"],
    fast: ["speed", "performance", "quick", "lookups"],
    index: ["indexes", "hnsw", "ivf", "graph", "cluster", "clusters", "proximity"],
    milvus: ["database", "collection", "collections", "grpc", "docker"],
    model: ["models", "minilm", "transformer", "sentence-transformers", "embeddings"],
    cosine: ["similarity", "metric", "normalize", "normalizing", "aligned"],
    document: ["documents", "text", "passage", "passages", "corpus"],
  };

  const STOP = new Set("how does do is are am be the a an of to in for on at by it its this that as with and or what why which when into".split(" "));

  function tokenize(s) {
    return s.toLowerCase().replace(/[^a-z0-9\s-]/g, " ").split(/\s+/).filter(Boolean);
  }

  // Build a weighted set of terms we want to see in a sentence.
  function wantedTerms(query) {
    const weights = new Map();
    for (const tok of tokenize(query)) {
      if (STOP.has(tok)) continue;
      weights.set(tok, Math.max(weights.get(tok) || 0, 1));
      for (const rel of (RELATED[tok] || [])) {
        weights.set(rel, Math.max(weights.get(rel) || 0, 0.5));
      }
    }
    return weights;
  }

  function splitSentences(text) {
    return text.match(/[^.!?]+[.!?]*\s*/g)?.map(s => s.trim()).filter(Boolean) || [text];
  }

  function scoreSentence(sentence, weights) {
    const toks = new Set(tokenize(sentence));
    let score = 0;
    for (const [term, w] of weights) if (toks.has(term)) score += w;
    return score;
  }

  function escapeHtml(s) {
    return s.replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
  }

  function rankAndRender(query) {
    const weights = wantedTerms(query);
    const scored = CORPUS.map(doc => {
      const sentences = splitSentences(doc.text);
      const sentScores = sentences.map(s => scoreSentence(s, weights));
      let bestIdx = 0, best = -1;
      sentScores.forEach((sc, i) => { if (sc > best) { best = sc; bestIdx = i; } });
      const docScore = Math.max(0, ...sentScores);
      return { doc, sentences, bestIdx, docScore };
    });

    scored.sort((a, b) => b.docScore - a.docScore);
    const top = Math.max(...scored.map(s => s.docScore), 0);

    document.getElementById("count").textContent = `${scored.length} results`;

    const resultsEl = document.getElementById("results");
    resultsEl.innerHTML = scored.map(item => {
      const pct = top > 0 ? Math.round((item.docScore / top) * 100) : 0;
      const body = item.sentences.map((s, i) =>
        i === item.bestIdx ? `<mark class="passage">${escapeHtml(s)}</mark>` : escapeHtml(s)
      ).join(" ");
      return `
        <article class="card">
          <div class="card-head">
            <h2>${escapeHtml(item.doc.title)}</h2>
            <div class="rel">
              <div class="bar"><span data-pct="${pct}"></span></div>
              <div class="label">relevance ${pct}%</div>
            </div>
          </div>
          <p class="doc-text">${body}</p>
          <div class="card-foot">
            <span class="docid">${escapeHtml(item.doc.id)}</span>
            <a class="download" href="#" onclick="return false;">Download</a>
          </div>
        </article>`;
    }).join("");

    requestAnimationFrame(() => {
      document.querySelectorAll(".rel .bar > span").forEach(el => {
        el.style.width = (el.dataset.pct || 0) + "%";
      });
    });
  }

  const input = document.getElementById("q");
  function run() { rankAndRender(input.value.trim() || "vector search"); }
  document.getElementById("go").addEventListener("click", run);
  input.addEventListener("keydown", e => { if (e.key === "Enter") run(); });

  // Prefill and run a default query so the highlight is visible on load.
  input.value = "how does vector search work?";
  run();
</script>
</body>
</html>
