<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Vector Search Demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #f6f7f9;
    --surface: #ffffff;
    --ink: #1a1d23;
    --muted: #6b7280;
    --line: #e6e8ec;
    --accent: #5b54e8;
    --accent-soft: #ecebfc;
    --red: #dc2626;
    --radius: 12px;
    --serif: "Fraunces", Georgia, serif;
    --sans: "Inter", system-ui, sans-serif;
    --mono: "IBM Plex Mono", ui-monospace, monospace;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: var(--sans);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 720px; margin: 0 auto; padding: 52px 24px 96px; }

  header { margin-bottom: 30px; }
  h1 {
    font-family: var(--serif);
    font-weight: 600;
    font-size: 30px;
    letter-spacing: -0.01em;
    margin: 0 0 4px;
  }
  header p { margin: 0; color: var(--muted); font-size: 15px; }

  .searchbar {
    display: flex;
    gap: 10px;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 8px 8px 8px 16px;
    box-shadow: 0 1px 2px rgba(26, 29, 35, 0.04);
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .searchbar:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-soft);
  }
  .searchbar input {
    flex: 1;
    border: 0;
    outline: 0;
    background: transparent;
    font-family: var(--sans);
    font-size: 16px;
    color: var(--ink);
  }
  .searchbar button {
    border: 0;
    background: var(--accent);
    color: #fff;
    font-family: var(--sans);
    font-weight: 500;
    font-size: 15px;
    padding: 0 22px;
    border-radius: 8px;
    cursor: pointer;
    transition: filter 0.15s;
    height: 40px;
  }
  .searchbar button:hover { filter: brightness(1.07); }
  .searchbar button:focus-visible {
    outline: 3px solid var(--accent-soft);
    outline-offset: 2px;
  }

  .status {
    margin: 18px 2px 10px;
    font-size: 13px;
    color: var(--muted);
    font-family: var(--mono);
    min-height: 18px;
  }

  .results { display: flex; flex-direction: column; gap: 14px; }

  .card {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 20px 22px;
    animation: rise 0.3s ease both;
  }
  @keyframes rise {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: none; }
  }

  .card-head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 18px;
    margin-bottom: 12px;
  }
  .card-head h2 {
    font-family: var(--serif);
    font-weight: 600;
    font-size: 19px;
    margin: 0;
    letter-spacing: -0.01em;
  }

  .rel { text-align: right; flex-shrink: 0; min-width: 96px; }
  .rel .bar {
    height: 4px;
    width: 96px;
    background: var(--line);
    border-radius: 99px;
    overflow: hidden;
    margin-bottom: 5px;
  }
  .rel .bar > span {
    display: block;
    height: 100%;
    width: 0;
    background: var(--accent);
    border-radius: 99px;
    transition: width 0.55s ease;
  }
  .rel .label {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
  }

  .doc-text { font-size: 14.5px; color: #353a44; margin: 0; }

  .card-foot {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 16px;
  }
  .docid {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--muted);
  }
  .download {
    font-family: var(--sans);
    font-weight: 500;
    font-size: 13px;
    color: var(--accent);
    text-decoration: none;
    border: 1px solid var(--line);
    padding: 7px 14px;
    border-radius: 8px;
    transition: background 0.15s, border-color 0.15s;
  }
  .download:hover { background: var(--accent-soft); border-color: var(--accent); }
  .download:focus-visible {
    outline: 3px solid var(--accent-soft);
    outline-offset: 2px;
  }

  .empty {
    text-align: center;
    color: var(--muted);
    padding: 44px 20px;
    border: 1px dashed var(--line);
    border-radius: var(--radius);
    font-size: 14px;
  }

  .error-state {
    text-align: center;
    color: var(--red);
    padding: 44px 20px;
    border: 1px dashed #fca5a5;
    border-radius: var(--radius);
    font-size: 14px;
  }
  .error-state strong { display: block; margin-bottom: 6px; font-size: 15px; }

  @media (prefers-reduced-motion: reduce) {
    .card { animation: none; }
    .rel .bar > span { transition: none; }
  }
  @media (max-width: 520px) {
    .card-head { flex-direction: column; }
    .rel { text-align: left; }
    h1 { font-size: 25px; }
  }

  /* Add Article form */
  .add-section {
    margin-top: 52px;
    border-top: 1px solid var(--line);
    padding-top: 36px;
  }
  .add-section h2 {
    font-family: var(--serif);
    font-weight: 600;
    font-size: 22px;
    letter-spacing: -0.01em;
    margin: 0 0 20px;
  }
  .add-form { display: flex; flex-direction: column; gap: 14px; }
  .field { display: flex; flex-direction: column; gap: 5px; }
  .field label {
    font-size: 13px;
    font-weight: 500;
    color: var(--ink);
  }
  .field input,
  .field textarea {
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 10px 14px;
    font-family: var(--sans);
    font-size: 15px;
    color: var(--ink);
    background: var(--surface);
    transition: border-color 0.15s, box-shadow 0.15s;
    outline: 0;
  }
  .field textarea { resize: vertical; min-height: 90px; }
  .field input:focus,
  .field textarea:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-soft);
  }
  .add-form button[type="submit"] {
    align-self: flex-start;
    border: 0;
    background: var(--accent);
    color: #fff;
    font-family: var(--sans);
    font-weight: 500;
    font-size: 15px;
    padding: 0 24px;
    height: 40px;
    border-radius: 8px;
    cursor: pointer;
    transition: filter 0.15s;
  }
  .add-form button[type="submit"]:hover { filter: brightness(1.07); }
  .add-form button[type="submit"]:focus-visible {
    outline: 3px solid var(--accent-soft);
    outline-offset: 2px;
  }
  .add-form button[type="submit"]:disabled { opacity: 0.6; cursor: not-allowed; }
  .add-feedback {
    font-size: 14px;
    border-radius: 8px;
    padding: 12px 16px;
    display: none;
  }
  .add-feedback.success {
    display: block;
    background: #f0fdf4;
    border: 1px solid #86efac;
    color: #15803d;
  }
  .add-feedback.error {
    display: block;
    background: #fef2f2;
    border: 1px solid #fca5a5;
    color: var(--red);
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Vector Search Demo</h1>
    <p>Semantic similarity search over a small document corpus.</p>
  </header>

  <div class="searchbar">
    <input
      id="q"
      type="text"
      placeholder="e.g. how does vector search work?"
      autocomplete="off"
      aria-label="Search query"
    />
    <button id="go" type="button">Search</button>
  </div>

  <div class="status" id="status" aria-live="polite"></div>
  <div class="results" id="results"></div>

  <section class="add-section" aria-label="Add Article">
    <h2>Add Article</h2>
    <form class="add-form" id="add-form" novalidate>
      <div class="field">
        <label for="art-headline">Headline</label>
        <input id="art-headline" name="headline" type="text" placeholder="Article headline" autocomplete="off" />
      </div>
      <div class="field">
        <label for="art-details">Details</label>
        <textarea id="art-details" name="details" placeholder="Article body / details"></textarea>
      </div>
      <div class="field">
        <label for="art-attachment-url">Attachment URL</label>
        <input id="art-attachment-url" name="attachment_url" type="url" placeholder="https://example.com/file.pdf" autocomplete="off" />
      </div>
      <button type="submit" id="add-btn">Submit</button>
    </form>
    <div class="add-feedback" id="add-feedback" aria-live="polite"></div>
  </section>
</div>

<script>
  const API_BASE = "";

  const input    = document.getElementById("q");
  const btn      = document.getElementById("go");
  const statusEl = document.getElementById("status");
  const resultsEl = document.getElementById("results");

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({
      "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
    }[c]));
  }

  function renderEmpty() {
    resultsEl.innerHTML = `<div class="empty">No matches, try rephrasing.</div>`;
  }

  function renderError(msg) {
    resultsEl.innerHTML = `
      <div class="error-state">
        <strong>Unable to reach the search service</strong>
        ${escapeHtml(msg)}
      </div>`;
  }

  function renderResults(results) {
    const top = Math.max(...results.map(r => r.score), 0);
    resultsEl.innerHTML = results.map(r => {
      const pct = top > 0 ? Math.round(r.score * 100 / top) : 0;
      const headline      = r.headline ?? "(untitled)";
      const details       = r.details ?? "";
      const articleId     = r.id ?? "";
      const dlUrl         = r.attachment_url ?? `/download/${encodeURIComponent(articleId)}`;
      return `
        <article class="card">
          <div class="card-head">
            <h2>${escapeHtml(headline)}</h2>
            <div class="rel">
              <div class="bar"><span data-pct="${pct}"></span></div>
              <div class="label">relevance ${pct}%</div>
            </div>
          </div>
          <p class="doc-text">${escapeHtml(details)}</p>
          <div class="card-foot">
            <span class="docid">${escapeHtml(articleId)}</span>
            <a class="download" href="${dlUrl}" download>Download</a>
          </div>
        </article>`;
    }).join("");

    requestAnimationFrame(() => {
      document.querySelectorAll(".rel .bar > span").forEach(el => {
        el.style.width = (el.dataset.pct || 0) + "%";
      });
    });
  }

  async function doSearch(query) {
    btn.disabled = true;
    statusEl.textContent = "Searching…";
    resultsEl.innerHTML = "";

    try {
      const resp = await fetch(`${API_BASE}/search?q=${encodeURIComponent(query)}`);
      if (!resp.ok) throw new Error(`Server returned ${resp.status} ${resp.statusText}`);
      const data = await resp.json();
      const results = Array.isArray(data.results) ? data.results : [];
      statusEl.textContent = results.length ? `${results.length} result${results.length === 1 ? "" : "s"}` : "";
      if (results.length === 0) {
        renderEmpty();
      } else {
        renderResults(results);
      }
    } catch (err) {
      statusEl.textContent = "";
      renderError(err.message);
    } finally {
      btn.disabled = false;
    }
  }

  btn.addEventListener("click", () => {
    const query = input.value.trim();
    if (query) doSearch(query);
  });

  input.addEventListener("keydown", e => {
    if (e.key === "Enter") {
      const query = input.value.trim();
      if (query) doSearch(query);
    }
  });

  // ---------------------------------------------------------------------------
  // Add Article form
  // ---------------------------------------------------------------------------

  const addForm      = document.getElementById("add-form");
  const addBtn       = document.getElementById("add-btn");
  const addFeedback  = document.getElementById("add-feedback");

  function showAddFeedback(type, msg) {
    addFeedback.className = `add-feedback ${type}`;
    addFeedback.textContent = msg;
  }

  addForm.addEventListener("submit", async (e) => {
    e.preventDefault();
    const headline      = addForm.elements["headline"].value.trim();
    const details       = addForm.elements["details"].value.trim();
    const attachment_url = addForm.elements["attachment_url"].value.trim();

    if (!headline) {
      showAddFeedback("error", "Headline is required.");
      return;
    }
    if (!details) {
      showAddFeedback("error", "Details are required.");
      return;
    }

    addBtn.disabled = true;
    addFeedback.className = "add-feedback";
    addFeedback.textContent = "";

    try {
      const createOpts = { headers: { "Content-Type": "application/json" }, body: JSON.stringify({ headline, details, attachment_url }) };
      createOpts.method = "POST";
      const resp = await fetch(`${API_BASE}/articles`, createOpts);
      if (!resp.ok) {
        const err = await resp.json().catch(() => ({}));
        throw new Error(err.error ?? `Server returned ${resp.status}`);
      }
      const data = await resp.json();
      showAddFeedback("success", `Article created. ID: ${escapeHtml(data.id)}`);
      addForm.reset();
    } catch (err) {
      showAddFeedback("error", err.message);
    } finally {
      addBtn.disabled = false;
    }
  });
</script>
</body>
</html>
